services:
  db:
    image: container-registry.oracle.com/database/free:latest
    container_name: apex_db
    hostname: database
    ports:
      - "2521:1521"
    environment:
      - ORACLE_PWD=Welkom_APEX_2026!
      - ORACLE_PASSWORD=Welkom_APEX_2026!
      - DBHOST=database
    volumes:
      - oracle_oradata:/opt/oracle/oradata

  ords:
    image: container-registry.oracle.com/database/ords:latest
    container_name: apex_ords
    ports:
      - "8080:8080"
    environment:
      - DBHOST=database
      - DBPORT=1521
      - DBSERVICENAME=FREEPDB1
      - ORACLE_PWD=Welkom_APEX_2026!
    volumes:
      - ords_config:/etc/ords/config
    depends_on:
      - db

volumes:
  oracle_oradata:
  ords_config:
